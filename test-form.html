<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 640px;
            padding: 40px;
        }

        h1 {
            color: #202124;
            margin-bottom: 8px;
            font-size: 32px;
            font-weight: 400;
        }

        .subtitle {
            color: #5f6368;
            margin-bottom: 30px;
            font-size: 13px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 32px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #202124;
            font-weight: 500;
            font-size: 13px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #1f71c6;
            box-shadow: 0 0 0 2px rgba(31, 113, 198, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .radio-item,
        .checkbox-item {
            display: flex;
            align-items: center;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #1f71c6;
        }

        .radio-item label,
        .checkbox-item label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 400;
            color: #202124;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit {
            background: #1f71c6;
            color: white;
            flex: 0;
        }

        .btn-submit:hover {
            background: #1a5fb4;
        }

        .btn-reset {
            background: white;
            color: #1f71c6;
            border: 1px solid #dadce0;
        }

        .btn-reset:hover {
            background: #f8f9fa;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
        }

        .success-message.show {
            display: block;
        }

        hr {
            margin: 32px 0;
            border: none;
            border-top: 1px solid #e8eaed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Test Form</h1>
        <p class="subtitle">Use this to test the Auto Fill Extension</p>

        <div id="successMessage" class="success-message">
            Form submitted successfully!
        </div>

        <form id="testForm">
            <!-- TEXT INPUT -->
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" placeholder="Enter your first name">
            </div>

            <!-- TEXT INPUT -->
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" placeholder="Enter your last name">
            </div>

            <!-- EMAIL INPUT -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your.email@example.com">
            </div>

            <!-- PASSWORD INPUT -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter a secure password">
            </div>

            <!-- PHONE INPUT -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="123-456-7890">
            </div>

            <hr>

            <!-- SELECT DROPDOWN -->
            <div class="form-group">
                <label for="country">Country</label>
                <select id="country" name="country">
                    <option value="">-- Select a country --</option>
                    <option value="us">United States</option>
                    <option value="uk">United Kingdom</option>
                    <option value="ca">Canada</option>
                    <option value="au">Australia</option>
                    <option value="jp">Japan</option>
                    <option value="de">Germany</option>
                    <option value="fr">France</option>
                </select>
            </div>

            <!-- SELECT DROPDOWN -->
            <div class="form-group">
                <label for="experience">Years of Experience</label>
                <select id="experience" name="experience">
                    <option value="">-- Select --</option>
                    <option value="0-1">0-1 years</option>
                    <option value="1-3">1-3 years</option>
                    <option value="3-5">3-5 years</option>
                    <option value="5-10">5-10 years</option>
                    <option value="10+">10+ years</option>
                </select>
            </div>

            <!-- RADIO BUTTONS -->
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="male" name="gender" value="male">
                        <label for="male">Male</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="other" name="gender" value="other">
                        <label for="other">Other</label>
                    </div>
                </div>
            </div>

            <hr>

            <!-- CHECKBOXES -->
            <div class="form-group">
                <label>Languages</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="english" name="languages" value="english">
                        <label for="english">English</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="spanish" name="languages" value="spanish">
                        <label for="spanish">Spanish</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="french" name="languages" value="french">
                        <label for="french">French</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="german" name="languages" value="german">
                        <label for="german">German</label>
                    </div>
                </div>
            </div>

            <hr>

            <!-- NUMBER INPUT -->
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="18" min="0" max="120">
            </div>

            <!-- DATE INPUT -->
            <div class="form-group">
                <label for="birthDate">Date of Birth</label>
                <input type="date" id="birthDate" name="birthDate">
            </div>

            <!-- TEXTAREA -->
            <div class="form-group">
                <label for="message">Message / Comments</label>
                <textarea id="message" name="message" placeholder="Tell us something..."></textarea>
            </div>

            <!-- BUTTONS -->
            <div class="button-group">
                <button type="submit" class="btn-submit">Submit Form</button>
                <button type="reset" class="btn-reset">Clear Form</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('testForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Show success message
            successMessage.classList.add('show');

            // Log form data
            const formData = new FormData(form);
            console.log('Form Data:');
            for (let [key, value] of formData.entries()) {
                console.log(`${key}: ${value}`);
            }

            // Hide message after 3 seconds
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 3000);
        });
    </script>
</body>
</html>
