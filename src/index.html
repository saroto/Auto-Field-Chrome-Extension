<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Fill Settings</title>
    <style>
      body {
        font-family: Roboto, sans-serif;
        width: 250px;
        padding: 15px;
        background: #f9f9f9;
      }
      h3 {
        margin-top: 0;
        color: #333;
      }
      label {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #45a049;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #4caf50;
        text-align: center;
        height: 14px;
      }
    </style>
  </head>
  <body>
    <h3>Autofill Data</h3>

    <div style="margin-bottom: 15px;">
        <label for="profileSelect" style="margin-top: 0; display: inline-block;">Profile:</label>
        <select id="profileSelect" style="width: 100%; padding: 6px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="Profile1">Profile 1 (Default)</option>
            <option value="Profile2">Profile 2 (Alternative)</option>
            <option value="Profile3">Profile 3 (Edge Cases)</option>
        </select>
    </div>

    <div id="dynamicFieldsContainer">
        <div style="font-size: 12px; color: #888;">Detecting fields on page...</div>
    </div>
    
    <button id="loadBtn" style="background: #FF9800; margin-top: 15px;">Load Fields</button>
    <button id="saveBtn">Save Settings</button>
    <div id="status"></div>

    <hr style="margin-top: 15px; border: 0; border-top: 1px solid #ddd;" />
    
    <button id="fillAllBtn" style="background: #2196F3; margin-top: 10px;">Fill All Fields (from Profile)</button>
    <button id="magicFillBtn" style="background: #9c27b0; margin-top: 10px;">Magic Fill (Fake Data)</button>

    <hr style="margin-top: 20px; border: 0; border-top: 1px solid #ddd;" />
    
    <div style="margin-top: 15px; text-align: center; font-size: 13px; color: #555;">
        Fields detected on page: <strong id="fieldCount">...</strong>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
