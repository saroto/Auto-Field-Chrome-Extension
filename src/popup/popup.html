<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Fill</title>
    <link rel="stylesheet" href="ui/popup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="popup-wrapper">
      <!-- ── Sticky header with icon actions ── -->
      <header class="app-header">
        <div class="app-title">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
          </svg>
          Auto Fill
        </div>
        <div class="header-actions">
          <button
            id="saveBtn"
            class="icon-btn icon-btn--save"
            title="Save &amp; Fill Form"
            aria-label="Save and fill form"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="9 11 12 14 22 4" />
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
            </svg>
          </button>
          <button
            id="deleteProfileBtn"
            class="icon-btn icon-btn--delete"
            title="Delete Profile"
            aria-label="Delete profile"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M9 6V4h6v2" />
            </svg>
          </button>
          <button id="loadBtn" class="icon-btn" title="Reload Fields" aria-label="Reload fields">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M23 4v6h-6" />
              <path d="M1 20v-6h6" />
              <path d="M3.51 9a9 9 0 0114.97-2.14L23 10" />
              <path d="M20.49 15a9 9 0 01-14.97 2.14L1 14" />
            </svg>
          </button>
        </div>
      </header>

      <div class="app-body">
        <!-- Actions (top for quick access) -->
        <div class="action-row">
          <button id="magicFillBtn" class="btn btn--magic" style="flex: 1">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="flex-shrink: 0"
            >
              <path d="M15 4V2" />
              <path d="M15 16v-2" />
              <path d="M8 9h2" />
              <path d="M20 9h2" />
              <path d="M17.8 11.8L19 13" />
              <path d="M15 9h0" />
              <path d="M17.8 6.2L19 5" />
              <path d="M3 21l9-9" />
              <path d="M12.2 6.2L11 5" />
            </svg>
            Magic Fill
          </button>
        </div>

        <!-- Profile Management -->
        <div class="card">
          <div class="profile-row">
            <select id="profileSelect">
              <option value="">-- Select Profile --</option>
            </select>
            <button id="newProfileBtn" class="btn btn--sm">+ New</button>
          </div>
          <div id="profileUrlInfo" class="url-badge">
            <span class="url-tag">URL</span>
            <span id="profileUrl" class="url-text">-</span>
          </div>
        </div>

        <!-- Status -->
        <div id="status"></div>

        <!-- Fields container -->
        <div id="dynamicFieldsContainer" class="card fields-card">
          <p class="placeholder-msg">Select or create a profile…</p>
        </div>

        <!-- Saved Profiles -->
        <div class="card">
          <p class="card-title">Saved Profiles</p>
          <div id="allProfilesList" class="profiles-list">
            <p class="placeholder-msg">No profiles saved yet.</p>
          </div>
        </div>

        <!-- Import / Export -->
        <div class="action-row">
          <button id="exportBtn" class="btn btn--outline" style="flex: 1">Export</button>
          <button id="importBtn" class="btn btn--outline" style="flex: 1">Import</button>
          <input type="file" id="importFile" accept=".json" style="display: none" />
        </div>

        <!-- Keyboard Shortcuts -->
        <div class="card shortcuts-card">
          <p class="card-title">Keyboard Shortcuts</p>
          <div class="shortcut-row"><kbd>Ctrl</kbd> + <kbd>/</kbd> <span class="shortcut-desc">Fill with saved data</span></div>
          <div class="shortcut-row"><kbd>Ctrl</kbd> + <kbd>\</kbd> <span class="shortcut-desc">Magic fill with test data</span></div>
        </div>
      </div>
    </div>

    <script src="index.bundled.js"></script>
  </body>
</html>
